<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Moon | Catalogo de Maquillaje</title>
    
    <!--Fuentes de Google-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

    <!--Estilos CSS-->
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
    <header>
        <div class="header-inner">
                <div class="header-marca">
                    <a href="#" id="logoHome">
                        <h1 class="logo">
                            <span class="logo-pretty">Pretty</span>
                            <span class="logo-moon">Moon</span>
                        </h1>
                    </a>
                    <span id="breadcrumbCategoria"></span>
                </div>

                <div class="header-acciones">
                    <div class="header-carrito">
                        <button class="btn btn-link" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                            <i class="bi bi-cart3" style="font-size: 1.5rem; color: white;"></i>
                            <span id="contador-carrito" class="badge bg-danger">0</span>
                        </button>
                    </div>

                    <!--Botones para Movil-->
                    <div class="filtro-mobile dropdown">
                        <button class="filtro-mobile-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <img src="img/Luna 2.png" alt="Filtrar" class="filtro-mobile-logo" />
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" data-categoria="todos" style="font-weight: 700 !important;">Todos</a></li>
                            <li><a class="dropdown-item" data-categoria="labios">Labios</a></li>
                            <li><a class="dropdown-item" data-categoria="rostro">Rostro</a></li>
                            <li><a class="dropdown-item" data-categoria="ojos">Ojos</a></li>
                            <li><a class="dropdown-item" data-categoria="skin">Skin Care</a></li>
                        </ul>
                    </div>

                    <!--Filtros-->
                    <section class="filtros">
                        <!--Dropdown para PC-->
                        <div class="dropdown dropdown-pc">
                            <button class="filtro-pc-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">Todos</button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item filtro-pc-item" data-categoria="labios">Labios</a></li>
                                <li><a class="dropdown-item filtro-pc-item" data-categoria="rostro">Rostro</a></li>
                                <li><a class="dropdown-item filtro-pc-item" data-categoria="ojos">Ojos</a></li>
                                <li><a class="dropdown-item filtro-pc-item" data-categoria="skin">Skin Care</a></li>
                            </ul>
                        </div>
                    </section>
                </div>
        </div>
    </header>

    <main>
        <div class="grid-productos" id="grid-productos">
            <!-- Los productos se generan aquí con JavaScript -->
        </div>
    </main>

    <footer>
        <p class="footer-frase">¿Lista para brillar?</p>
        <p class="footer-frase">Siguenos y se parte de la familia Pretty Moon 💜</p>
  
        <div class="footer-redes">
            <a href="https://instagram.com/prettymoon.sv" target="_blank" class="footer-icono">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram" />
            </a>
            <a href="https://tiktok.com/@prettymoon.sv" target="_blank" class="footer-icono">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/tiktok.svg" alt="TikTok" />
            </a>
            <a href="https://wa.me/50379443225" target="_blank" class="footer-icono footer-whatsapp">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg" alt="WhatsApp" />
            </a>
        </div>

        <p>© 2026 Pretty Moon</p>
    </footer>

    <!-- Botón volver arriba -->
    <button class="btn-arriba" id="btnArriba">
        <i class="bi bi-chevron-up"></i>
    </button>

     <!-- Modal de bienvenida -->
    <div class="modal fade" id="modalBienvenida" tabindex="-1" data-bs-backdrop="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-pretty">
          <div class="modal-body text-center">
            <img src="img/Luna 1.png" alt="Pretty Moon" class="modal-logo" />
            <h2 class="modal-titulo">¡Bienvenida a Pretty Moon!</h2>
            <p class="modal-texto">Encuentra tu maquillaje perfecto para cada momento</p>
            <button class="modal-btn" data-bs-dismiss="modal">Ver Catalogo</button>
          </div>
        </div>
      </div>
    </div>

    <!--Modal de informacion del producto-->
    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content modal-producto-content">
                <button type="button" class="modal-producto-cerrar" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i>
                </button>
                <div class="modal-producto-body">
                    <div class="modal-producto-imagen-box">
                        <div id="modalProductoCarrusel" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-inner" id="modalCarruselInner">
                                <img src="" alt="" class="modal-producto-imagen" id="modalProductoImagen" />
                            </div>
                        </div>
                    </div>
                    <div class="modal-producto-info">
                        <span class="modal-producto-categoria" id="modalProductoCategoria"></span>
                        <h2 class="modal-producto-nombre" id="modalProductoNombre"></h2>
                        <p class="modal-producto-color" id="modalProductoColor"></p>
                        <p class="modal-producto-descripcion" id="modalProductoDescripcion"></p>
                        <p class="modal-producto-precio" id="modalProductoPrecio"></p>
                        <button class="btn-whatsapp" id="modalProductoBtn">Agregar al Carrito</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCarrito" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Tu Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="lista-carrito">
                <!-- Aquí se listarán los productos -->
            </div>
            <div class="modal-footer text-center d-block">
                <button class="btn btn-primary w-100" id="btn-enviar-pedido">
                    Enviar Pedido
                </button>
            </div>
            </div>
        </div>
    </div>
    <div id="notif-carrito-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
